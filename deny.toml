# cargo-deny configuration for CosmosVote
# Docs: https://embarkstudios.github.io/cargo-deny/

[licenses]
# Deny any license not in the allow list.
unlicensed = "deny"
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
]
deny = [
  "GPL-2.0",
  "GPL-3.0",
  "AGPL-3.0",
  "LGPL-2.0",
  "LGPL-2.1",
  "LGPL-3.0",
  "EUPL-1.1",
  "EUPL-1.2",
  "SSPL-1.0",
  "BUSL-1.1",
]
# Treat dual-licensed crates (e.g. MIT OR Apache-2.0) as allowed if either
# option is in the allow list.
allow-osi-fsf-free = "neither"
copyleft = "deny"
default = "deny"

[bans]
# Warn on duplicate versions of the same crate.
multiple-versions = "warn"

[advisories]
# Deny crates with known security advisories.
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
