name: Enforce Branch Protection

on:
  push:
    branches:
      - main

jobs:
  prevent-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check if commit is from a Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The GitHub API allows finding pull requests associated with a commit
          PR_COUNT=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.groot-preview+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            | jq length)
          
          if [ -z "$PR_COUNT" ] || [ "$PR_COUNT" -eq 0 ]; then
            echo "ERROR: Direct push to main detected. All changes must be made via Pull Request."
            exit 1
          else
            echo "Success: Commit is associated with $PR_COUNT pull request(s)."
          fi
