name: Scheduled Security Checks

on:
  schedule:
    - cron: '0 2 * * 1'   # Weekly Monday 02:00 UTC (dependency audits)
    - cron: '0 3 * * *'   # Nightly 03:00 UTC (linting & SAST)
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results

jobs:
  # ---------------------------------------------------------------------------
  # Rust dependency audit (cargo-audit + cargo-deny)
  # ---------------------------------------------------------------------------
  rust-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --deny warnings
        continue-on-error: false

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses and advisories (cargo-deny)
        run: cargo deny check advisories licenses

  # ---------------------------------------------------------------------------
  # Frontend (npm audit + license check)
  # ---------------------------------------------------------------------------
  npm-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (critical + high)
        run: npm audit --audit-level=high

      - name: Check frontend licenses
        run: npm run license-check

  # ---------------------------------------------------------------------------
  # Clippy SAST (Rust linting with security-relevant lints)
  # ---------------------------------------------------------------------------
  rust-lint:
    name: Rust Security Linting (Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Clippy with security lints
        run: |
          cargo clippy --all-targets --features testutils -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::integer_arithmetic

  # ---------------------------------------------------------------------------
  # Secret scanning (detect accidentally committed secrets)
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Docker image vulnerability scan
  # ---------------------------------------------------------------------------
  docker-scan:
    name: Docker Image Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build --target builder -t cosmosvote:scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cosmosvote:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ---------------------------------------------------------------------------
  # Alert on new critical findings via GitHub issue
  # ---------------------------------------------------------------------------
  alert-on-failure:
    name: Alert on Critical Findings
    runs-on: ubuntu-latest
    needs: [rust-audit, npm-audit, rust-lint, secret-scan, docker-scan]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub issue for security finding
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Scheduled security check failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '## Scheduled Security Check Failure',
              '',
              `One or more security jobs failed in the scheduled run on ${new Date().toUTCString()}.`,
              '',
              '**Failed jobs:** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
              '',
              '### Required Actions',
              '- [ ] Review audit output for new CVEs',
              '- [ ] Update or pin vulnerable dependencies',
              '- [ ] Verify no secrets were exposed',
              '- [ ] Close this issue once resolved',
              '',
              '> This issue was created automatically by the Scheduled Security Checks workflow.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'automated'],
            });
