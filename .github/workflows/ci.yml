name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: "1.78.0"

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features testutils -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Run all tests
        run: cargo test --all --features testutils
      - name: Run property-based tests
        run: cargo test prop_ --all --features testutils

  benchmark:
    name: Instruction Count Benchmarks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Run instruction count benchmarks
        run: cargo test bench_ --features testutils -- --nocapture

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [fmt, lint, test, benchmark]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM binaries
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Check WASM sizes
        run: |
          echo "=== WASM binary sizes ==="
          find target/wasm32-unknown-unknown/release -name "*.wasm" -exec ls -lh {} \;
          # Size budget rationale: 
          # Keeping WASM binaries under 100KB ensures fast deployment and execution 
          # on the Stellar network, minimizing gas costs and execution timeouts.
          for wasm_file in target/wasm32-unknown-unknown/release/*.wasm; do
            size=$(stat -c%s "$wasm_file")
            if [ "$size" -gt 102400 ]; then
              echo "Error: $wasm_file exceeds the 100KB size limit ($size bytes)"
              exit 1
            fi
          done
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-binaries
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check Rust dependency licenses
        run: cargo deny check licenses

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Check frontend dependency licenses
        working-directory: frontend
        run: npm run license-check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --output-dir coverage/ --features testutils --exclude-files "*/test*" --fail-under 80
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
