name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  lint:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features testutils -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Run all tests
        run: cargo test --all --features testutils
      - name: Run property-based tests
        run: cargo test prop_ --all --features testutils

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [fmt, lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build WASM binaries
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Check WASM sizes
        run: |
          echo "=== WASM binary sizes ==="
          find target/wasm32-unknown-unknown/release -name "*.wasm" -exec ls -lh {} \;
      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binaries
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secret patterns
        run: |
          # Check for private key headers
          if grep -rE '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.env*' --include='*.sh' .; then
            echo "ERROR: Private key material detected in source files." && exit 1
          fi
          # Check for Stellar secret keys (S + 55 base32 chars)
          if grep -rE '\bS[A-Z2-7]{55}\b' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' .; then
            echo "ERROR: Stellar secret key pattern detected in source files." && exit 1
          fi
          # Check for generic high-entropy tokens / API key assignments
          if grep -rEi '(api_key|apikey|secret_key|auth_token|password)\s*=\s*["'"'"'][A-Za-z0-9/+_\-]{20,}["'"'"']' --include='*.rs' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' .; then
            echo "ERROR: Possible hardcoded credential detected in source files." && exit 1
          fi
          echo "Secret scan passed."

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Generate coverage report
        run: cargo tarpaulin --out Xml --output-dir coverage/ --features testutils --exclude-files "*/test*"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
