name: Docker Image Scan

on:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'frontend/**'
      - '.github/workflows/docker-image-scan.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'frontend/**'
      - '.github/workflows/docker-image-scan.yml'

jobs:
  scan-backend:
    name: Scan Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        run: docker build -t cosmosvote-backend:${{ github.sha }} .

      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cosmosvote-backend:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

  scan-frontend:
    name: Scan Frontend Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build frontend image
        run: docker build -t cosmosvote-frontend:${{ github.sha }} ./frontend
        continue-on-error: true

      - name: Run Trivy filesystem scan on frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./frontend
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL
