name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

      - name: Build WASM binaries
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp target/wasm32-unknown-unknown/release/cosmosvote_governance.wasm release/
          cp target/wasm32-unknown-unknown/release/cosmosvote_token.wasm release/
          cd release
          sha256sum *.wasm > checksums.sha256
          cat checksums.sha256

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            release/cosmosvote_governance.wasm
            release/cosmosvote_token.wasm
            release/checksums.sha256
