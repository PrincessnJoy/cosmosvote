name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all --features testutils

      - name: Build WASM binaries
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp target/wasm32-unknown-unknown/release/cosmosvote_governance.wasm release/
          cp target/wasm32-unknown-unknown/release/cosmosvote_token.wasm release/
          cd release
          sha256sum *.wasm > checksums.sha256
          cat checksums.sha256

      - name: Extract version from Cargo.toml
        id: cargo_version
        run: |
          VERSION=$(grep '^version =' contracts/governance/Cargo.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="${{ steps.cargo_version.outputs.version }}"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract notes between the version header and the next header
          NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d')
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.cargo_version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            release/cosmosvote_governance.wasm
            release/cosmosvote_token.wasm
            release/checksums.sha256
          draft: false
          prerelease: false
