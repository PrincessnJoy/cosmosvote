<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CosmosVote — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 400px;
        background: #1e293b;
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        box-shadow: 0 4px 24px rgba(0,0,0,.4);
      }
      .icon { font-size: 3rem; margin-bottom: 1rem; }
      h1 { font-size: 1.5rem; color: #4A90E2; margin-bottom: .5rem; }
      p { color: #94a3b8; font-size: .95rem; line-height: 1.5; margin-bottom: 1.5rem; }
      button {
        background: #4A90E2;
        color: #fff;
        border: none;
        border-radius: .5rem;
        padding: .6rem 1.4rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover { background: #3a7bc8; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>CosmosVote</h1>
      <p>You're offline. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
